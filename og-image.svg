<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fef3c7" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- 装饰圆形 -->
  <circle cx="100" cy="100" r="200" fill="#ffffff" opacity="0.08" />
  <circle cx="1100" cy="530" r="180" fill="#ffffff" opacity="0.08" />
  <circle cx="950" cy="120" r="80" fill="#ffffff" opacity="0.1" />

  <!-- 顶部小标 -->
  <g transform="translate(600, 130)">
    <rect x="-110" y="-25" width="220" height="40" rx="20" fill="#ffffff" opacity="0.2" />
    <text x="0" y="5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#ffffff" text-anchor="middle">🎓 一次过四六级</text>
  </g>

  <!-- 主标题 -->
  <text x="600" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="900" fill="url(#title)" text-anchor="middle" letter-spacing="-2">CET通</text>

  <!-- 副标题 -->
  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="500" fill="#ffffff" opacity="0.9" text-anchor="middle">英语四六级备考一站式平台</text>

  <!-- 特性 -->
  <g transform="translate(600, 430)">
    <text x="-260" y="0" font-family="-apple-system, sans-serif" font-size="22" fill="#ffffff" opacity="0.95" text-anchor="middle">📚 海量真题</text>
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="22" fill="#ffffff" opacity="0.95" text-anchor="middle">🎯 模拟考试</text>
    <text x="260" y="0" font-family="-apple-system, sans-serif" font-size="22" fill="#ffffff" opacity="0.95" text-anchor="middle">🧠 错题本</text>
  </g>

  <!-- 底部强调 -->
  <g transform="translate(600, 530)">
    <rect x="-160" y="-30" width="320" height="50" rx="25" fill="#ffffff" />
    <text x="0" y="5" font-family="-apple-system, sans-serif" font-size="24" font-weight="700" fill="#7c3aed" text-anchor="middle">✨ 完全免费 · 无套路</text>
  </g>

  <!-- 域名 -->
  <text x="600" y="600" font-family="-apple-system, sans-serif" font-size="18" fill="#ffffff" opacity="0.7" text-anchor="middle">cettong.cn</text>
</svg>
